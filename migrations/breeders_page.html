<div id="breeders-page">
  <div class="page-layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-label">▾ State</div>
      <ul id="state-list" class="state-list"></ul>
    </aside>

    <!-- RIGHT MAIN CONTENT -->
    <main class="main-content">
      <h1 class="featured-title">Featured POA Pomsky Breeders</h1>
      <div id="featured-section"></div>

      <h2 class="all-title">All POA-Approved Pomsky Breeders</h2>
      <div id="other-section"></div>
    </main>

  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

#breeders-page {
  max-width: 1200px;
  margin: auto;
  font-family: 'Quicksand', Arial, sans-serif;
  color: #1e293b;
}

/* ── Layout ── */
.page-layout {
  display: flex;
  gap: 40px;
  padding: 32px 20px;
  align-items: flex-start;
}

/* ── Sidebar ── */
.sidebar {
  width: 180px;
  flex-shrink: 0;
  position: sticky;
  top: 20px;
}

.sidebar-label {
  font-weight: 700;
  font-size: 13px;
  color: #334155;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid #e2e8f0;
}

.state-list {
  list-style: none;
}

.state-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 4px;
  font-size: 13px;
  cursor: pointer;
  color: #475569;
  border-radius: 6px;
  transition: color 0.2s;
}

.state-list li::before {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1.5px solid #cbd5e1;
  flex-shrink: 0;
  transition: all 0.2s;
}

.state-list li:hover { color: #0369a1; }

.state-list li.active {
  color: #0369a1;
  font-weight: 600;
}
.state-list li.active::before {
  background: #0ea5e9;
  border-color: #0ea5e9;
}

/* ── Main ── */
.main-content { flex: 1; min-width: 0; }

/* ── Section Titles ── */
.featured-title {
  font-size: 2.4rem;
  font-weight: 800;
  color: #ca8a04;          /* gold — matches image */
  margin-bottom: 8px;
  line-height: 1.2;
}

.all-title {
  font-size: 2.2rem;
  font-weight: 800;
  color: #1e293b;
  margin: 48px 0 8px;
}

/* ── Breeder Card ── */
.breeder-card {
  display: flex;
  gap: 24px;
  padding: 28px 0;
  border-top: 1.5px dashed #cbd5e1;
  align-items: flex-start;
}

.breeder-card:first-child { border-top: none; }

/* ── Left: Image Column ── */
.breeder-img-col {
  width: 130px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.breeder-img {
  width: 130px;
  height: 130px;
  border-radius: 10px;
  object-fit: cover;
  background: #f1f5f9;
  border: 1px solid #e2e8f0;
}

.breeder-img-name {
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  color: #334155;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1.3;
}

/* ── Right: Info Column ── */
.breeder-info { flex: 1; min-width: 0; }

.breeder-header {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.breeder-business-name {
  font-size: 22px;
  font-weight: 800;
  color: #0f172a;
}

.badge-featured {
  background: #2094b1;
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 999px;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.breeder-bio {
  font-size: 14px;
  color: #334155;
  line-height: 1.7;
  margin-bottom: 12px;
}

.breeder-location {
  font-size: 13px;
  color: #475569;
  margin-bottom: 12px;
}

/* ── Contact Row ── */
.breeder-contact {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px 0;
  font-size: 13px;
  margin-bottom: 12px;
}

.breeder-contact .contact-item {
  color: #334155;
  padding-right: 16px;
  margin-right: 8px;
  border-right: 1px solid #cbd5e1;
}

.breeder-contact .contact-item:last-child {
  border-right: none;
  padding-right: 0;
  margin-right: 0;
}

.breeder-contact a {
  color: #0ea5e9;
  text-decoration: none;
}
.breeder-contact a:hover { text-decoration: underline; }

/* ── Social Icons ── */
.breeder-socials {
  display: flex;
  gap: 14px;
  margin-top: 6px;
  align-items: center;
}

.social-icon {
  display: flex;
  align-items: center;
  justify-content: center;
  color: #1d8ca8;
  text-decoration: none;
  transition: opacity 0.2s, transform 0.2s;
  flex-shrink: 0;
}
.social-icon:hover { opacity: 0.7; transform: scale(1.12); }
.social-icon svg { display: block; }

/* ── Empty / Loading ── */
.no-results {
  padding: 24px 0;
  color: #94a3b8;
  font-size: 14px;
}

/* ── Responsive ── */
@media (max-width: 860px) {
  .page-layout { flex-direction: column; gap: 24px; }
  .sidebar { width: 100%; position: relative; }
  .state-list { display: flex; flex-wrap: wrap; gap: 4px 16px; }
  .featured-title, .all-title { font-size: 1.8rem; }
}

@media (max-width: 500px) {
  .breeder-card { flex-direction: column; }
  .breeder-img-col { width: 100%; flex-direction: row; align-items: center; gap: 16px; }
  .breeder-img { width: 90px; height: 90px; }
}
</style>

<script>
// const API = 'https://pomsky-backend.onrender.com';

const FALLBACK_IMG = 'https://pomskyownersassociation.com/wp-content/uploads/2021/12/Litter-Coming-Soon-975x1024-5-768x807.jpg';

let selectedState = '';

/**
 * profile_image and social_* are text[] in Supabase.
 * Safely returns the first element, or the value itself if it's already a string.
 */
function firstOf(val) {
  if (!val) return null;
  if (Array.isArray(val)) return val[0] || null;
  return val;
}

/* ── Build one breeder card ── */
function breederCardHTML(b, isFeatured) {
  const imgUrl = firstOf(b.profile_image);
  const img    = (imgUrl && imgUrl.startsWith('http')) ? imgUrl : FALLBACK_IMG;

  const location = [b.city, b.state].filter(Boolean).join(', ');

  // Social links (text[])
  const fbUrl  = firstOf(b.social_facebook);
  const igUrl  = firstOf(b.social_instagram);
  const twUrl  = firstOf(b.social_twitter);

  // SVG icons — all coloured #1d8ca8, sized 22px
  const SVG = {
    fb: `<svg width="22" height="22" viewBox="0 0 24 24" fill="#1d8ca8"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95C18.05 21.45 22 17.19 22 12z"/></svg>`,
    ig: `<svg width="22" height="22" viewBox="0 0 24 24" fill="#1d8ca8"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>`,
    tw: `<svg width="22" height="22" viewBox="0 0 24 24" fill="#1d8ca8"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.736-8.84L2.25 2.25h6.985l4.26 5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`,
    web: `<svg width="22" height="22" viewBox="0 0 24 24" fill="#1d8ca8"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`,
  };

  const socialIcons = [
    fbUrl     ? `<a href="${fbUrl}"     target="_blank" rel="noopener" class="social-icon" title="Facebook">${SVG.fb}</a>`   : '',
    igUrl     ? `<a href="${igUrl}"     target="_blank" rel="noopener" class="social-icon" title="Instagram">${SVG.ig}</a>` : '',
    twUrl     ? `<a href="${twUrl}"     target="_blank" rel="noopener" class="social-icon" title="Twitter/X">${SVG.tw}</a>` : '',
    b.website ? `<a href="${b.website}" target="_blank" rel="noopener" class="social-icon" title="Website">${SVG.web}</a>`  : '',
  ].join('');

  // Contact items — only render if they have a value
  const contactItems = [
    b.breeder_name ? `<span class="contact-item">${b.breeder_name}</span>` : '',
    b.phone   ? `<span class="contact-item">${b.phone}</span>` : '',
    b.email   ? `<span class="contact-item"><a href="mailto:${b.email}">${b.email}</a></span>` : '',
    b.website ? `<span class="contact-item"><a href="${b.website}" target="_blank" rel="noopener">${b.website.replace(/^https?:\/\//, '')}</a></span>` : '',
  ].filter(Boolean).join('');

  return `
    <div class="breeder-card">

      <!-- Left: photo + caption -->
      <div class="breeder-img-col">
        <img
          src="${img}"
          class="breeder-img"
          alt="${b.business_name || b.breeder_name || 'Breeder'}"
          onerror="this.onerror=null;this.src='${FALLBACK_IMG}';"
        />
        <div class="breeder-img-name">${b.business_name || b.breeder_name || ''}</div>
      </div>

      <!-- Right: details -->
      <div class="breeder-info">
        <div class="breeder-header">
          <span class="breeder-business-name">${b.business_name || b.breeder_name || 'Breeder'}</span>
          ${isFeatured ? '<span class="badge-featured">Featured Breeder</span>' : ''}
        </div>

        ${b.bio ? `<p class="breeder-bio">${b.bio}</p>` : ''}

        ${location ? `<div class="breeder-location">${location}</div>` : ''}

        ${contactItems ? `<div class="breeder-contact">${contactItems}</div>` : ''}

        ${socialIcons ? `<div class="breeder-socials">${socialIcons}</div>` : ''}
      </div>

    </div>
  `;
}

/* ── Render list into a container ── */
function renderBreeders(containerId, breeders, isFeatured) {
  const el = document.getElementById(containerId);
  if (!breeders || !breeders.length) {
    el.innerHTML = '<p class="no-results">No breeders found.</p>';
    return;
  }
  el.innerHTML = breeders.map(b => breederCardHTML(b, isFeatured)).join('');
}

/* ── Fetch breeders ── */
async function loadBreeders() {
  document.getElementById('featured-section').innerHTML = '<p class="no-results">Loading...</p>';
  document.getElementById('other-section').innerHTML    = '';
  try {
    const url = `${API}/breeder${selectedState ? `?state=${encodeURIComponent(selectedState)}` : ''}`;
    const res  = await fetch(url, { credentials: 'include' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    renderBreeders('featured-section', data.featured || [], true);
    renderBreeders('other-section',    data.normal   || [], false);
  } catch (err) {
    console.error('Breeder load error:', err);
    document.getElementById('featured-section').innerHTML = '<p class="no-results">Failed to load breeders.</p>';
    document.getElementById('other-section').innerHTML    = '';
  }
}

/* ── Fetch states for sidebar ── */
async function loadStates() {
  try {
    const res  = await fetch(`${API}/breeder/meta/states`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const list = document.getElementById('state-list');

    const allLi = document.createElement('li');
    allLi.textContent = 'All';
    allLi.className   = 'active';
    allLi.onclick     = () => { selectedState = ''; setActiveState(allLi); loadBreeders(); };
    list.appendChild(allLi);

    (data.states || []).forEach(state => {
      const li = document.createElement('li');
      li.textContent = state;
      li.onclick = () => { selectedState = state; setActiveState(li); loadBreeders(); };
      list.appendChild(li);
    });
  } catch (err) {
    console.error('State load error:', err);
  }
}

function setActiveState(activeLi) {
  document.querySelectorAll('.state-list li').forEach(li => li.classList.remove('active'));
  activeLi.classList.add('active');
}

loadStates();
loadBreeders();
</script>
